<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
</head>
<body>
  <header>
    <div class="container">
      <h1>{{ site.title }}</h1>
    </div>
  </header>

  <nav>
    <div class="container">
      <a href="{{ '/' | relative_url }}">Home</a> |
      <a href="https://github.com/jakesky45/Robotinc">GitHub</a> |
      <a href="https://aws.amazon.com/bedrock">Bedrock</a> |
      <a href="https://strandsagents.com/latest/">Strands</a> |
      <a href="https://aws.amazon.com/greengrass">Greengrass</a> |
      <a href="https://shop.m5stack.com/products/m5stickc-plus-esp32-pico-mini-iot-development-kit">M5Stick</a>
    </div>
  </nav>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="container">
    </div>
  </footer>

  <style>
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 30px;
    }
    main {
      padding: 20px 0;
    }
  </style>
</body>
</html>
